name: Implementation
description: A single deliverable linked to a parent experiment
labels: ["implementation"]
body:
  - type: input
    id: parent-experiment
    attributes:
      label: Parent experiment
      description: "Issue number of the parent experiment"
      placeholder: "#"
    validations:
      required: true
  - type: textarea
    id: what-to-build
    attributes:
      label: What to build
      description: "Numbered steps with concrete specs. Generated by the pipeline."
    validations:
      required: true
  - type: textarea
    id: done-when
    attributes:
      label: Done when
      description: "Verifiable acceptance criteria the verification agent checks against the PR diff."
    validations:
      required: true
  - type: textarea
    id: blocked-by
    attributes:
      label: Blocked by
      description: "Links to issues that must merge first. Leave empty if none."
    validations:
      required: false
  - type: checkboxes
    id: deviation-flag
    attributes:
      label: Deviation flag
      options:
        - label: "Implementation deviates from spec"
          required: false
  - type: textarea
    id: deviation-explanation
    attributes:
      label: Deviation explanation
      description: "One line explaining what differs and why. Only fill in if deviation flag is checked."
    validations:
      required: false
