name: Weekly Repo Health Check

on:
  schedule:
    - cron: '0 9 * * 1'  # Every Monday at 09:00 UTC
  workflow_dispatch:  # Manual trigger

jobs:
  health-check:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      actions: read

    steps:
      - name: Run health check
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.ORG_HEALTH_CHECK_TOKEN }}
          script: |
            const repos = ['schedjoules-app', 'event-discovery-backend', 'calendar-store-api', 'behavior-engine'];
            const findings = [];
            const now = new Date();
            const ninetyDaysAgo = new Date(now - 90 * 24 * 60 * 60 * 1000);
            const sixtyDaysAgo = new Date(now - 60 * 24 * 60 * 60 * 1000);

            for (const repo of repos) {
              const repoFindings = [];

              // Check workflows with 0 runs in 90 days
              try {
                const workflows = await github.rest.actions.listRepoWorkflows({
                  owner: 'schedjoules',
                  repo: repo
                });

                for (const wf of workflows.data.workflows) {
                  if (wf.state !== 'active') continue;

                  const runs = await github.rest.actions.listWorkflowRuns({
                    owner: 'schedjoules',
                    repo: repo,
                    workflow_id: wf.id,
                    per_page: 1,
                    created: `>=${ninetyDaysAgo.toISOString().split('T')[0]}`
                  });

                  if (runs.data.total_count === 0) {
                    repoFindings.push(`⚠️ Workflow \`${wf.name}\` has 0 runs in the last 90 days`);
                  }
                }
              } catch (e) {
                repoFindings.push(`❌ Could not check workflows: ${e.message}`);
              }

              // Check stale branches (no commits in 60 days)
              try {
                const branches = await github.rest.repos.listBranches({
                  owner: 'schedjoules',
                  repo: repo,
                  per_page: 100
                });

                for (const branch of branches.data) {
                  if (branch.name === 'main' || branch.name === 'master') continue;

                  const commit = await github.rest.repos.getCommit({
                    owner: 'schedjoules',
                    repo: repo,
                    ref: branch.commit.sha
                  });

                  const commitDate = new Date(commit.data.commit.committer.date);
                  if (commitDate < sixtyDaysAgo) {
                    const daysAgo = Math.floor((now - commitDate) / (24 * 60 * 60 * 1000));
                    repoFindings.push(`🌿 Branch \`${branch.name}\` has no commits in ${daysAgo} days`);
                  }
                }
              } catch (e) {
                repoFindings.push(`❌ Could not check branches: ${e.message}`);
              }

              if (repoFindings.length > 0) {
                findings.push(`### ${repo}\n${repoFindings.join('\n')}`);
              }
            }

            if (findings.length === 0) {
              console.log('All repos healthy. No issue created.');
              return;
            }

            const body = `## Weekly Repo Health Check\n\nDate: ${now.toISOString().split('T')[0]}\n\n${findings.join('\n\n')}\n\n---\n*This check reports only. It does not delete, modify, or fix anything. Review and act on findings manually.*`;

            await github.rest.issues.create({
              owner: 'schedjoules',
              repo: '.github',
              title: `Repo health check — ${now.toISOString().split('T')[0]}`,
              body: body,
              labels: ['maintenance']
            });

            console.log('Health check issue created.');
